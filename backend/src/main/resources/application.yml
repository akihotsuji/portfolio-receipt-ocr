spring:
  application:
    name: receiptocr-backend

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:55432/portfolio?currentSchema=receipt_ocr
    username: portfolio_user
    password: portfolio_pass
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: receipt_ocr
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.portfolio.receiptocr

server:
  port: 8083
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  issuer: "https://example.com"
  jwks-uri: "http://localhost:18080/api/.well-known/jwks.json"
  required-app: "RECEIPT_OCR"

logging:
  level:
    com.portfolio.receiptocr: DEBUG
    org.springframework.security: DEBUG
