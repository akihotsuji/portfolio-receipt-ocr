name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::497614015161:role/sunaba-github-actions-deploy
  APP_NAME: receiptocr
  FRONTEND_PATH: receipt-ocr

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/sunaba-${{ env.APP_NAME }}-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/sunaba-${{ env.APP_NAME }}-backend:latest \
            .
          docker push $ECR_REGISTRY/sunaba-${{ env.APP_NAME }}-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/sunaba-${{ env.APP_NAME }}-backend:latest
      - name: Deploy to ECS
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition sunaba-${{ env.APP_NAME }}-backend \
            --query 'taskDefinition' --output json)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "${{ steps.ecr-login.outputs.registry }}/sunaba-${{ env.APP_NAME }}-backend:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster sunaba-cluster \
            --service sunaba-${{ env.APP_NAME }}-backend \
            --task-definition $NEW_TASK_DEF_ARN
      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster sunaba-cluster \
            --services sunaba-${{ env.APP_NAME }}-backend
        timeout-minutes: 10

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        run: |
          npm ci
          VITE_API_BASE_URL=/api/${{ env.APP_NAME }} VITE_PORTAL_API_BASE_URL=/api/portal npm run build
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to S3
        run: |
          aws s3 sync dist/ \
            s3://sunaba-frontend-497614015161/${{ env.FRONTEND_PATH }}/ \
            --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1CC1JXEJACMCB \
            --paths "/${{ env.FRONTEND_PATH }}/*"
